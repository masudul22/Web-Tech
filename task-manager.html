<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mini Task Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e10;
      --surface: #17171a;
      --border: #2a2a30;
      --accent: #c8f55a;
      --accent-dim: rgba(200, 245, 90, 0.12);
      --accent-glow: rgba(200, 245, 90, 0.25);
      --text: #e8e8ec;
      --muted: #5a5a6a;
      --del: #ff5c5c;
      --del-dim: rgba(255, 92, 92, 0.12);
      --done-bg: rgba(200, 245, 90, 0.06);
      --radius: 10px;
      --mono: 'DM Mono', monospace;
      --display: 'Syne', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px 80px;
    }

    /* Subtle grid bg */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(200,245,90,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,245,90,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 560px;
    }

    /* Header */
    header {
      margin-bottom: 40px;
    }

    .label {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }

    h1 {
      font-family: var(--display);
      font-size: clamp(32px, 6vw, 48px);
      font-weight: 800;
      line-height: 1;
      color: var(--text);
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    /* Input row */
    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
    }

    #task-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 18px;
      font-family: var(--mono);
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #task-input::placeholder { color: var(--muted); }

    #task-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    #add-btn {
      background: var(--accent);
      color: #0e0e10;
      border: none;
      border-radius: var(--radius);
      padding: 14px 20px;
      font-family: var(--display);
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
      line-height: 1;
    }

    #add-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    #add-btn:active { transform: scale(0.95); }

    /* Stats bar */
    .stats {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .stats span { color: var(--accent); font-weight: 500; }

    /* Error message */
    .error-msg {
      font-size: 12px;
      color: var(--del);
      margin-top: -18px;
      margin-bottom: 14px;
      min-height: 16px;
      letter-spacing: 0.05em;
      transition: opacity 0.2s;
    }

    .error-msg:empty { opacity: 0; }

    /* Task list */
    #task-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 50px 20px;
      color: var(--muted);
      font-size: 13px;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      letter-spacing: 0.05em;
    }

    .empty-state .icon {
      font-size: 28px;
      display: block;
      margin-bottom: 10px;
      opacity: 0.4;
    }

    /* Task item */
    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      transition: border-color 0.2s, background 0.2s;
      animation: slide-in 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes slide-in {
      from { opacity: 0; transform: translateY(-10px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .task-item:hover { border-color: #3a3a44; }

    .task-item.completed {
      background: var(--done-bg);
      border-color: rgba(200,245,90,0.2);
    }

    /* Checkbox */
    .task-check {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-radius: 5px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, background 0.2s;
      font-size: 11px;
      color: transparent;
    }

    .task-check:hover { border-color: var(--accent); }

    .task-item.completed .task-check {
      background: var(--accent);
      border-color: var(--accent);
      color: #0e0e10;
    }

    /* Task text */
    .task-text {
      flex: 1;
      font-size: 14px;
      line-height: 1.5;
      cursor: pointer;
      transition: color 0.2s, text-decoration-color 0.2s;
      text-decoration: none;
      text-decoration-color: transparent;
      color: var(--text);
      user-select: none;
    }

    .task-item.completed .task-text {
      color: var(--muted);
      text-decoration: line-through;
      text-decoration-color: var(--muted);
    }

    /* Delete button */
    .delete-btn {
      background: transparent;
      border: 1px solid transparent;
      border-radius: 6px;
      color: var(--muted);
      font-size: 14px;
      cursor: pointer;
      padding: 4px 8px;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      flex-shrink: 0;
      font-family: var(--mono);
    }

    .delete-btn:hover {
      color: var(--del);
      border-color: var(--del);
      background: var(--del-dim);
    }

    /* Keyboard hint */
    .hint {
      margin-top: 24px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-align: center;
    }

    .hint kbd {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 6px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <p class="label">// task manager</p>
      <h1>GET THINGS<br><span>DONE.</span></h1>
      <p class="subtitle">Add tasks below. Click to complete. Delete when done.</p>
    </header>

    <!-- Part 1: Input + Button -->
    <div class="input-row">
      <input
        type="text"
        id="task-input"
        placeholder="what needs to be done?"
        autocomplete="off"
      />
      <button id="add-btn" title="Add task">+</button>
    </div>

    <p class="error-msg" id="error-msg"></p>

    <!-- Stats bar -->
    <div class="stats" id="stats" style="display:none;">
      <div>total <span id="count-total">0</span></div>
      <div>done <span id="count-done">0</span></div>
      <div>left <span id="count-left">0</span></div>
    </div>

    <!-- Part 1: Task container -->
    <ul id="task-list">
      <li class="empty-state" id="empty-state">
        <span class="icon">⬡</span>
        no tasks yet — add one above
      </li>
    </ul>

    <p class="hint">Press <kbd>Enter</kbd> to add &nbsp;·&nbsp; Click text to toggle complete</p>
  </div>

  <script>
    // ── Part 2: Select DOM elements ───────────────────────────────────────────
    const taskInput     = document.querySelector('#task-input');
    const addBtn        = document.querySelector('#add-btn');
    const taskList      = document.querySelector('#task-list');
    const errorMsg      = document.querySelector('#error-msg');
    const statsBar      = document.querySelector('#stats');
    const countTotal    = document.querySelector('#count-total');
    const countDone     = document.querySelector('#count-done');
    const countLeft     = document.querySelector('#count-left');
    const emptyState    = document.querySelector('#empty-state');

    // ── Internal state ────────────────────────────────────────────────────────
    let taskCount = 0; // used for unique IDs

    // ── Helper: update stats bar ──────────────────────────────────────────────
    const updateStats = () => {
      const all  = taskList.querySelectorAll('.task-item');
      const done = taskList.querySelectorAll('.task-item.completed');
      const total = all.length;

      if (total === 0) {
        statsBar.style.display = 'none';
        if (!emptyState.isConnected) taskList.appendChild(emptyState);
      } else {
        statsBar.style.display = 'flex';
        if (emptyState.isConnected) emptyState.remove();
        countTotal.textContent = total;
        countDone.textContent  = done.length;
        countLeft.textContent  = total - done.length;
      }
    };

    // ── Helper: show/clear error ──────────────────────────────────────────────
    const showError = (msg) => {
      errorMsg.textContent = msg;
      setTimeout(() => { errorMsg.textContent = ''; }, 2500);
    };

    // ── Part 4 + 5: Create and append a task element ──────────────────────────
    const createTask = (text) => {
      taskCount++;

      // Part 4: Create elements
      const li         = document.createElement('li');
      const checkBox   = document.createElement('button');
      const taskText   = document.createElement('span');
      const deleteBtn  = document.createElement('button');

      li.classList.add('task-item');
      li.dataset.id = taskCount;

      checkBox.classList.add('task-check');
      checkBox.title = 'Mark complete';
      checkBox.setAttribute('aria-label', 'Toggle complete');
      checkBox.textContent = '✓';

      // Part 4: Set text using textContent
      taskText.classList.add('task-text');
      taskText.textContent = text;

      deleteBtn.classList.add('delete-btn');
      deleteBtn.textContent = 'rm';
      deleteBtn.title = 'Delete task';
      deleteBtn.setAttribute('aria-label', `Delete task: ${text}`);

      // ── Part 8: Mark as completed (toggle CSS class) ──────────────────────
      const toggleComplete = () => {
        li.classList.toggle('completed');
        updateStats();
      };

      checkBox.addEventListener('click', toggleComplete);
      taskText.addEventListener('click', toggleComplete);

      // ── Part 6: Delete task ───────────────────────────────────────────────
      deleteBtn.addEventListener('click', () => {
        li.style.animation = 'none';
        li.style.transition = 'opacity 0.2s, transform 0.2s';
        li.style.opacity = '0';
        li.style.transform = 'translateX(10px) scale(0.97)';
        setTimeout(() => {
          li.remove();
          updateStats();
        }, 200);
      });

      li.appendChild(checkBox);
      li.appendChild(taskText);
      li.appendChild(deleteBtn);

      // Part 5: Append to DOM
      taskList.appendChild(li);
      updateStats();
    };

    // ── Part 3: Add task handler ──────────────────────────────────────────────
    const handleAddTask = () => {
      const raw  = taskInput.value;
      const text = raw.trim();

      // Part 3: Prevent empty tasks
      if (!text) {
        showError('⚠ task cannot be empty.');
        taskInput.focus();
        return;
      }

      // Part 7: Template literal for logging (also demonstrates ES6+)
      console.log(`[task-manager] Added task #${taskCount + 1}: "${text}"`);

      createTask(text);

      // Part 8: Clear the input after adding
      taskInput.value = '';
      taskInput.focus();
    };

    // Part 3: Button click listener
    addBtn.addEventListener('click', handleAddTask);

    // Part 8: Keyboard support — Enter key
    taskInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleAddTask();
    });
  </script>
</body>
</html>
