<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - ThePortal</title>
  <link rel="icon" type="image/png" href="movie.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .auth-container {
      padding: 20px 20px;
      display: flex;
      justify-content: center;
    }

    .auth-form {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow-card);
    }

    .auth-form h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--primary);
      text-align: center;
    }

    .auth-form p {
      color: var(--text-secondary);
      font-size: 0.95rem;
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-weight: 500;
      margin-bottom: 8px;
      color: var(--text-primary);
      font-size: 0.9rem;
    }

    .form-group label .required {
      color: #dc3545;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-sizing: border-box;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px var(--primary-muted);
    }

    .form-group input.error {
      border-color: #dc3545;
      box-shadow: 0 0 0 3px rgba(220, 53, 69, 0.1);
    }

    .form-group input::placeholder {
      color: var(--text-muted);
    }

    .field-error {
      color: #dc3545;
      font-size: 0.8rem;
      margin-top: 4px;
      display: none;
    }

    .field-error.show {
      display: block;
    }

    .btn-primary {
      width: 100%;
      padding: 12px 16px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 24px;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    .btn-primary:disabled {
      background: var(--text-muted);
      cursor: not-allowed;
    }

    .auth-link {
      text-align: center;
      margin-top: 20px;
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    .auth-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }

    .auth-link a:hover {
      color: var(--primary-light);
    }

    .error-message {
      background: rgba(220, 53, 69, 0.1);
      border: 1px solid rgba(220, 53, 69, 0.3);
      color: #dc3545;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 0.9rem;
    }

    .success-message {
      background: rgba(40, 167, 69, 0.1);
      border: 1px solid rgba(40, 167, 69, 0.3);
      color: #28a745;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 0.9rem;
    }

    .loading {
      opacity: 0.6;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <!-- NAVBAR -->
  <header class="navbar" role="banner">
    <a href="/" class="logo" aria-label="ThePortal - Go to homepage">ThePortal</a>
    <button class="hamburger" id="hamburger" aria-label="Open navigation menu" aria-expanded="false" aria-controls="nav-menu">
      <span class="hamburger-line" aria-hidden="true"></span>
      <span class="hamburger-line" aria-hidden="true"></span>
      <span class="hamburger-line" aria-hidden="true"></span>
    </button>
    <nav id="nav-menu" role="navigation" aria-label="Primary navigation">
      <ul class="nav-list" role="list">
        <li class="nav-item" role="none">
          <a href="index.html" class="nav-link" aria-label="Go to homepage">Home</a>
        </li>
        <li class="nav-item" role="none">
          <a href="signin.html" class="nav-link" aria-label="Sign in to your account">Sign In</a>
        </li>
        <li class="nav-item" role="none">
          <button class="theme-toggle" id="theme-toggle" aria-label="Switch to light mode" aria-pressed="false" title="Toggle dark/light mode">
            <svg class="icon icon-moon" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            <svg class="icon icon-sun" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          </button>
        </li>
      </ul>
    </nav>
  </header>

  <!-- MAIN CONTENT -->
  <main id="main-content" class="main" tabindex="-1">
    <div class="auth-container">
      <form class="auth-form" id="register-form" novalidate>
        <h1>Join ThePortal</h1>

        <div id="message-container"></div>

        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" placeholder="John Doe" />
          <div class="field-error" id="name-error">Full name is required</div>
        </div>

        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="johndoe" />
          <div class="field-error" id="username-error">Username is required</div>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="john@example.com" />
          <div class="field-error" id="email-error">Email address is required</div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="At least 6 characters" />
          <div class="field-error" id="password-error">Password is required</div>
        </div>

        <div class="form-group">
          <label for="passwordConfirm">Confirm Password</label>
          <input type="password" id="passwordConfirm" name="passwordConfirm" placeholder="Confirm password" />
          <div class="field-error" id="passwordConfirm-error">Confirm password is required</div>
        </div>

        <button type="submit" class="btn-primary">Create Account</button>

        <div class="auth-link">
          Already have an account? <a href="signin.html">Sign In</a>
        </div>
      </form>
    </div>
  </main>

  <div id="live-region" aria-live="polite" aria-atomic="true" class="sr-only"></div>

  <script src="app.js"></script>
  <script src="auth.js"></script>
  <script>
    const form = document.getElementById('register-form');
    const inputs = form.querySelectorAll('input[type="text"], input[type="email"], input[type="password"]');

    // Email validation function - checks for @ and . with text after dot
    function isValidEmail(email) {
      return email.includes('@') && email.includes('.') && email.indexOf('@') < email.lastIndexOf('.') && email.lastIndexOf('.') < email.length - 1;
    }

    // Password validation function - checks for minimum length
    function isValidPassword(password) {
      return password.length >= 6;
    }

    // Clear error on input
    inputs.forEach(input => {
      input.addEventListener('input', () => {
        input.classList.remove('error');
        const errorEl = document.getElementById(input.id + '-error');
        if (errorEl) {
          errorEl.classList.remove('show');
        }
      });
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const name = document.getElementById('name').value.trim();
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const passwordConfirm = document.getElementById('passwordConfirm').value;

      const messageContainer = document.getElementById('message-container');
      messageContainer.innerHTML = '';

      // Validate all fields
      const errors = {};
      const emailInput = document.getElementById('email');
      
      if (!name) errors.name = true;
      if (!username) errors.username = true;
      if (!email) {
        errors.email = true;
      } else if (!isValidEmail(email)) {
        errors.email = 'invalid';
      }
      if (!password) {
        errors.password = true;
      } else if (!isValidPassword(password)) {
        errors.password = 'tooShort';
      }
      if (!passwordConfirm) {
        errors.passwordConfirm = true;
      } else if (password !== passwordConfirm) {
        errors.passwordConfirm = 'mismatch';
      }

      // Display validation errors
      Object.keys(errors).forEach(fieldName => {
        const input = document.getElementById(fieldName);
        const errorEl = document.getElementById(fieldName + '-error');
        if (input && errorEl) {
          input.classList.add('error');
          errorEl.classList.add('show');
          if (fieldName === 'email' && errors[fieldName] === 'invalid') {
            errorEl.textContent = 'Please enter a valid email address';
          } else if (fieldName === 'email' && errors[fieldName] === true) {
            errorEl.textContent = 'Email address is required';
          } else if (fieldName === 'password' && errors[fieldName] === 'tooShort') {
            errorEl.textContent = 'Password must be at least 6 characters';
          } else if (fieldName === 'password' && errors[fieldName] === true) {
            errorEl.textContent = 'Password is required';
          } else if (fieldName === 'passwordConfirm' && errors[fieldName] === 'mismatch') {
            errorEl.textContent = 'Passwords do not match';
          } else if (fieldName === 'passwordConfirm' && errors[fieldName] === true) {
            errorEl.textContent = 'Confirm password is required';
          }
        }
      });

      // If there are validation errors, stop here
      if (Object.keys(errors).length > 0) {
        return;
      }

      const button = e.target.querySelector('button');
      button.disabled = true;

      try {
        const response = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, username, email, password, passwordConfirm }),
        });

        const data = await response.json();

        if (!response.ok) {
          // Parse error message to identify which field caused the issue
          const errorMsg = data.error || 'Failed to register user';
          
          // Check if error is field-specific and show it accordingly
          if (errorMsg.toLowerCase().includes('username')) {
            const emailInput = document.getElementById('username');
            const errorEl = document.getElementById('username-error');
            emailInput.classList.add('error');
            errorEl.classList.add('show');
            errorEl.textContent = errorMsg;
          } else if (errorMsg.toLowerCase().includes('email')) {
            const emailInput = document.getElementById('email');
            const errorEl = document.getElementById('email-error');
            emailInput.classList.add('error');
            errorEl.classList.add('show');
            errorEl.textContent = errorMsg;
          } else if (errorMsg.toLowerCase().includes('password')) {
            const passwordInput = document.getElementById('password');
            const errorEl = document.getElementById('password-error');
            passwordInput.classList.add('error');
            errorEl.classList.add('show');
            errorEl.textContent = errorMsg;
          } else {
            messageContainer.innerHTML = `<div class="error-message">${errorMsg}</div>`;
          }
          
          button.disabled = false;
          return;
        }

        // Save token
        localStorage.setItem('authToken', data.token);

        // Scroll to top
        window.scrollTo(0, 0);

        messageContainer.innerHTML = '<div class="success-message">Account created successfully! Redirecting...</div>';

        setTimeout(() => {
          window.location.href = '/';
        }, 1500);
      } catch (error) {
        messageContainer.innerHTML = `<div class="error-message">An error occurred. Please try again.</div>`;
        button.disabled = false;
        console.error('Registration error:', error);
      }
    });
  </script>
</body>
</html>
